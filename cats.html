<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="My cats" />
  <title>My Cats — Leah Hoogstra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #f8f9f5;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: #ffffff;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(14, 77, 107, 0.1);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #0e4d6b;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: block;
    }

    .back-link {
      display: inline-block;
      color: #0e4d6b;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.5rem 0;
      border-bottom: 2px solid #2d6a4f;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      color: #2d6a4f;
      border-bottom-color: #0e4d6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Cats</h1>
    <img src="assets/images/cats.jpg" alt="Cats!" />
    <a href="index.html" class="back-link">← Back</a>
  </div>
</body>
</html>
